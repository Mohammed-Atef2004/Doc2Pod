<div class="bg-pulse"></div>
<div class="bg-pulse"></div>
<div class="bg-pulse"></div>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Log in to access your personalized podcast library</p>
            <div class="podcast-icons">
                <i class="fas fa-podcast"></i>
                <i class="fas fa-headphones"></i>
                <i class="fas fa-microphone"></i>
                <i class="fas fa-volume-up"></i>
            </div>
        </div>
        
        <form class="auth-form" (ngSubmit)="onLogin()">
            
            <div *ngIf="errorMessage" class="error-msg" style="color: #ff4d4d; background: rgba(255,77,77,0.1); padding: 10px; border-radius: 8px; margin-bottom: 1rem; text-align: center; border: 1px solid #ff4d4d;">
                {{ errorMessage }}
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <i class="input-icon fas fa-envelope"></i>
                    <input type="email" name="email" [(ngModel)]="loginData.email" placeholder="Enter your email" required>
                </div>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="input-icon fas fa-lock"></i>
                    <input type="password" name="password" [(ngModel)]="loginData.password" placeholder="••••••••" required>
                    <span class="password-toggle">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
            </div>
            
            <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>
            
            <button type="submit" class="btn-gold" [disabled]="isLoading">
                <i *ngIf="!isLoading" class="fas fa-sign-in-alt"></i>
                {{ isLoading ? 'Signing In... ⏳' : 'Sign In' }}
            </button>
        </form>
        
        <div class="divider">
            <span>Or continue with</span>
        </div>
        
        <div class="social-login">
            <button type="button" class="social-btn">
                <i class="fab fa-google"></i>
                Google
            </button>
            <button type="button" class="social-btn">
                <i class="fab fa-github"></i>
                GitHub
            </button>
        </div>
        
        <div class="auth-footer">
            <p>Don't have an account? <a routerLink="/register" class="link-gold">Create one now</a></p>
            <p class="terms-notice">By signing in, you agree to our Terms & Privacy Policy</p>
        </div>
    </div>
</div>
