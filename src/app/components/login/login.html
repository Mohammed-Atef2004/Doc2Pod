<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PodcastHub | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./login.css">
</head>
<body>
    <!-- Animated background elements -->
    <div class="bg-pulse"></div>
    <div class="bg-pulse"></div>
    <div class="bg-pulse"></div>
    
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Log in to access your personalized podcast library</p>
                <div class="podcast-icons">
                    <i class="fas fa-podcast"></i>
                    <i class="fas fa-headphones"></i>
                    <i class="fas fa-microphone"></i>
                    <i class="fas fa-volume-up"></i>
                </div>
            </div>
            
            <form class="auth-form" id="loginForm">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="input-icon fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="input-icon fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                        <span class="password-toggle" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>
                
                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#" class="forgot-password" id="forgotPasswordLink">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn-gold" id="submitBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    Sign In
                </button>
            </form>
            
            <div class="divider">
                <span>Or continue with</span>
            </div>
            
            <div class="social-login">
                <button type="button" class="social-btn" id="googleLogin">
                    <i class="fab fa-google"></i>
                    Google
                </button>
                <button type="button" class="social-btn" id="appleLogin">
                    <i class="fab fa-github"></i>
                    GitHub
                </button>
            </div>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="/register" id="registerLink">Create one now</a></p>
                <p class="terms-notice">By signing in, you agree to our Terms & Privacy Policy</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
