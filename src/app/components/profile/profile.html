<div class="profile-wrapper" *ngIf="!isLoading && userData">
  <div class="profile-container">
    <div class="profile-header-premium">
      <div class="avatar-wrapper">
        <div class="avatar-glow"></div>
        <div class="avatar-main">
          {{ userData.firstName?.[0] }}{{ userData.lastName?.[0] }}
        </div>
      </div>
      <div class="user-meta">
        <h1>{{ userData.firstName }} {{ userData.lastName }}</h1>
        <p class="status-badge">Premium Account</p>
      </div>
    </div>

    <div class="profile-grid">
      <div class="info-card-fakhma">
        <label>Email Address</label>
        <p>{{ userData.email }}</p>
        <div class="card-icon">✉️</div>
      </div>

      <div class="info-card-fakhma">
        <label>Username</label>
        <p>@{{ userData.username }}</p>
        <div class="card-icon">🎙️</div>
      </div>

      <div class="info-card-fakhma">
        <label>Account Status</label>
        <p>Active User</p>
        <div class="card-icon">🗓️</div>
      </div>
    </div>

    <div class="profile-footer">
      <button class="btn-edit">Edit Settings</button>
      <button class="btn-logout-premium" (click)='onLogout()'>Sign Out</button>
    </div>
  </div>
</div>

<div *ngIf="isLoading" style="text-align: center; margin-top: 50px; color: #fbbf24;">
  <h3>Loading your profile... ✨</h3>
</div>
