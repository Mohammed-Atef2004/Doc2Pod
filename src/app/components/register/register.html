<div class="bg-pulse"></div>
<div class="bg-pulse"></div>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="brand-badge">Premium AI Studio</div>
            <h2>Create Account</h2>
            <p>Join <span class="gold-text">Doc2Pod</span> and start converting documents to masterpieces</p>
        </div>
        
        <form class="auth-form" (ngSubmit)="onSubmit()">
            
            <div *ngIf="errorMessage" class="error-msg" style="color: #ff4d4d; background: rgba(255,77,77,0.1); padding: 10px; border-radius: 8px; margin-bottom: 1rem; text-align: center; border: 1px solid #ff4d4d;">
                {{ errorMessage }}
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label>First Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" name="firstName" [(ngModel)]="registerData.firstName" placeholder="First Name" required>
                    </div>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Last Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" name="lastName" [(ngModel)]="registerData.lastName" placeholder="Last Name" required>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-at input-icon"></i>
                    <input type="text" name="username" [(ngModel)]="registerData.username" placeholder="Choose a unique username" required>
                </div>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" name="email" [(ngModel)]="registerData.email" placeholder="email@example.com" required>
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" name="password" [(ngModel)]="registerData.password" placeholder="Create a strong password" required>
                </div>
            </div>

            <button type="submit" class="btn-gold-premium" [disabled]="isLoading">
                <span>{{ isLoading ? 'Creating Account... ⏳' : 'Join Now' }}</span>
                <i *ngIf="!isLoading" class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a routerLink="/login" class="link-gold">Log in here</a></p>
        </div>
    </div>
</div>
