<div class="bg-pulse"></div>
<div class="bg-pulse"></div>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="brand-badge">Premium AI Studio</div>
            <h2>Create Account</h2>
            <p>Join <span class="gold-text">Doc2Pod</span> and start converting documents to masterpieces</p>
            
            <div class="podcast-icons">
                <i class="fas fa-file-alt"></i>
                <i class="fas fa-wave-square"></i>
                <i class="fas fa-microphone-alt"></i>
                <i class="fas fa-headphones"></i>
            </div>
        </div>
        
        <form class="auth-form">
            <div class="input-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" placeholder="Enter your full name" required>
                </div>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" placeholder="email@example.com" required>
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" placeholder="Create a strong password" required>
                    <span class="password-toggle"><i class="fas fa-eye"></i></span>
                </div>
            </div>

            

           

            <button type="submit" class="btn-gold-premium">
                <span>Join Now</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="divider"><span>Or continue with</span></div>
        <div class="social-login">
            <button class="social-btn google"><i class="fab fa-google"></i> Google</button>
            <button class="social-btn apple"><i class="fab fa-github"></i> GitHub</button>
        </div>

        <div class="auth-footer">
            <p>Already have an account? <a routerLink="/login" class="link-gold">Log in here</a></p>
        </div>
    </div>
</div>
