<div class="upload-wrapper">
  <div class="glass-card upload-container">
    <h2>Transform PDF to Podcast</h2>
    <p class="subtitle">Upload your document and let AI do the magic</p>
    
    <div class="drop-zone" (click)="fileInput.click()">
      <input type="file" #fileInput hidden accept=".pdf">
      <div class="upload-icon">
        <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
        </svg>
      </div>
      <p>Drag your PDF here or <span>browse files</span></p>
    </div>

    <div class="config-row">
      <div class="select-box">
        <label>Voice Tone</label>
        <select>
          <option>Friendly Egyptian</option>
          <option>Professional</option>
        </select>
      </div>
    </div>

    <button class="btn-primary-fakhma">Generate Podcast ✨</button>
  </div>
</div>
