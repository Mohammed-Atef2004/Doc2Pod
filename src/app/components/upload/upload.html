<div class="upload-wrapper">
  <div class="upload-container">
    
    <h2>Transform PDF to Podcast</h2>
    <p class="subtitle">Turn documents into cinematic AI narration</p>

    <div class="drop-zone" (click)="fileInput.click()">
      <input type="file" #fileInput hidden accept=".pdf">

      <div class="upload-icon">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <path d="M17 8l-5-5-5 5"/>
          <path d="M12 3v12"/>
        </svg>
      </div>

      <p>Drop your PDF here or <span>browse files</span></p>
    </div>

    <div class="config-row">
      <label>Voice Tone</label>
      <select>
        <option>🎙 Friendly Egyptian</option>
        <option>🎧 Professional Studio</option>
      </select>
    </div>

    <button class="btn-primary-fakhma">
      Generate Podcast ✨
    </button>

  </div>
</div>
